<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locs Atelier by ShiksStylist</title>

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;500;600&display=swap" rel="stylesheet">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>

/* BACKGROUND IMAGE */
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: url('https://raw.githubusercontent.com/Nairopixel/Locs-Atelier-by-shee-booking/refs/heads/main/images/uma%20preta%20tem%20o%20poder.jfif') no-repeat center center/cover;
}

/* DARK OVERLAY */
.overlay {
    background: rgba(0,0,0,0.55);
    min-height: 100vh;
    padding: 20px;
}

/* CONTAINER */
.container {
    max-width: 500px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    animation: fadeIn 0.8s ease;
}

/* TITLE */
h1 {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    color: #111;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #c59d5f;
    font-weight: 500;
    margin-bottom: 25px;
}

/* FORM */
label {
    font-weight: 500;
    margin-top: 12px;
    display: block;
}

input, select, textarea {
    width: 100%;
    padding: 13px;
    margin-top: 6px;
    border-radius: 12px;
    border: 1px solid #eee;
    font-size: 14px;
}

/* FOCUS */
input:focus, select:focus, textarea:focus {
    border: 1px solid #c59d5f;
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    background: linear-gradient(135deg, #c59d5f, #a67c3b);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* LOADING TEXT */
.loading {
    display: none;
    text-align: center;
    margin-top: 10px;
    color: #c59d5f;
    font-weight: 500;
}

/* WHATSAPP */
.whatsapp {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #25D366;
    font-weight: bold;
    text-decoration: none;
}

/* FOOTER */
.footer {
    text-align: center;
    font-size: 12px;
    margin-top: 10px;
    color: #aaa;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="overlay">

<div class="container">

<h1>Locs Atelier</h1>
<div class="subtitle">by ShiksStylist ✨ Luxury Locs & Styling</div>

<form id="bookingForm">

<label>Full Name</label>
<input type="text" name="name" required>

<label>Email Address</label>
<input type="email" name="email" required>   

<label>Phone Number</label>
<input type="tel" name="phone" required>

<label>Location</label>
<input type="text" name="location" required>

<label>Service</label>
<select name="service" required>
<option value="">Select Service</option>
<option>Sister Locs Installation</option>
<option>Artificial Locs & Extensions</option>
<option>Instant Locs</option>
<option>Fresh Locs</option>
<option>Interlocking</option>
<option>Clean Retouch</option>
<option>Locs Repair</option>
<option>Detox & Deep Cleaning</option>
<option>Scalp Treatment</option>
<option>Dope Styling</option>
<option>Hair Colouring</option>
<option>Locs Accessorizing</option>
<option>Hair Consultation</option>
<option>Products Recommendation</option>
<option>Braiding</option>
<option>Hair Cuts</option>
<option>Gel Application</option>
</select>

<label>Date</label>
<input type="date" name="date" required>

<label>Time</label>
<input type="time" name="time" required>

<label>Notes</label>
<textarea name="notes"></textarea>

<button type="submit">Book Appointment</button>

<div class="loading" id="loadingText">Sending booking...</div>

</form>

<a class="whatsapp" href="https://wa.me/254753055885?text=Hi%20I%20want%20to%20book%20a%20locs%20appointment">
Book via WhatsApp instead
</a>

<div class="footer">Premium hair care experience ✨</div>

</div>
</div>

<script>
(function() {
    emailjs.init("iHnxSy9RQTf-WjHKZ");
})();

document.getElementById("bookingForm").addEventListener("submit", function(e) {
    e.preventDefault();

    document.getElementById("loadingText").style.display = "block";

    emailjs.sendForm(
        "service_oa1pywk",
        "template_pt2dpon",
        this
    ).then(() => {
        window.location.href = "thankyou.html";
    }, (error) => {
        document.getElementById("loadingText").style.display = "none";
        alert("Failed to send booking.");
        console.log(error);
    });
});
</script>

</body>
                                   </html>
