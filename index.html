<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Locs Atelier by Shee Booking</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #f5e6e8, #fdf6f7);
}

/* Container */
.container {
    max-width: 500px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    animation: fadeIn 0.8s ease;
}

/* Logo */
.logo {
    text-align: center;
    margin-bottom: 15px;
}

.logo img {
    width: 120px;
    border-radius: 50%;
}

/* Headings */
h1 {
    text-align: center;
    font-family: 'Playfair Display', serif;
    color: #3e1f1f;
    margin-bottom: 5px;
    letter-spacing: 1px;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #777;
    margin-bottom: 20px;
}

/* Form */
label {
    font-weight: 500;
    margin-top: 12px;
    display: block;
}

input, select, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 12px;
    border: 1px solid #eee;
    font-size: 14px;
}

/* Button */
button {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: linear-gradient(135deg, #6b2c2c, #3e1f1f);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.03);
}

/* WhatsApp */
.whatsapp {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #25D366;
    font-weight: bold;
    text-decoration: none;
}

/* Footer */
.footer {
    text-align: center;
    font-size: 12px;
    margin-top: 10px;
    color: #aaa;
}

/* Animation */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGO (Replace src with your generated logo link later) -->
    <div class="logo">
        <img src="https://via.placeholder.com/120" alt="Locs Atelier Logo">
    </div>

    <h1>Locs Atelier</h1>
    <div class="subtitle">by Shee — Luxury Locs & Hair Studio</div>

    <form id="bookingForm">

        <label>Full Name</label>
        <input type="text" name="name" required>

        <label>Phone Number</label>
        <input type="tel" name="phone" required>

        <label>Location</label>
        <input type="text" name="location" required>

        <label>Service</label>
        <select name="service" required>
            <option value="">Select Service</option>
            <option>Sister Locs Installation</option>
            <option>Artificial Locs & Extensions</option>
            <option>Instant Locs</option>
            <option>Fresh Locs</option>
            <option>Interlocking</option>
            <option>Clean Retouch</option>
            <option>Locs Repair</option>
            <option>Detox & Deep Cleaning</option>
            <option>Scalp Treatment</option>
            <option>Dope Styling</option>
            <option>Hair Colouring</option>
            <option>Locs Accessorizing</option>
            <option>Hair Consultation</option>
            <option>Products Recommendation</option>
            <option>Braiding</option>
            <option>Hair Cuts</option>
            <option>Gel Application</option>
        </select>

        <label>Date</label>
        <input type="date" name="date" required>

        <label>Time</label>
        <input type="time" name="time" required>

        <label>Notes</label>
        <textarea name="notes"></textarea>

        <button type="submit">Book Appointment</button>
    </form>

    <a class="whatsapp" href="https://wa.me/254113832180?text=Hi%20I%20want%20to%20book%20a%20locs%20appointment">
        Or Book via WhatsApp
    </a>

    <div class="footer">We respond quickly — premium service guaranteed ✨</div>
</div>

<script>
(function() {
    emailjs.init("iHnxSy9RQTf-WjHKZ");
})();

document.getElementById("bookingForm").addEventListener("submit", function(e) {
    e.preventDefault();

    emailjs.sendForm(
        "service_la0vybr",
        "template_w4vctxl",
        this
    ).then(() => {
        window.location.href = "thankyou.html";
    }, (error) => {
        alert("Failed to send booking.");
        console.log(error);
    });
});
</script>

</body>
  </html>
